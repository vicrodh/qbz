name: Feature request
description: Suggest an idea or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform does this apply to?
      options:
        - All platforms
        - Linux
        - macOS
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: |
        What problem are you trying to solve?
        Why is the current behavior insufficient?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.

  - type: textarea
    id: scope
    attributes:
      label: Scope / impact
      description: |
        - Does this affect audio, UI, performance, or packaging?
        - Is this platform-specific?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or related projects are welcome.
