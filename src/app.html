<!doctype html>
<html lang="en" style="background-color: transparent;">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QBZ</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="background-color: transparent; margin: 0;">
    <script>
      // Apply system titlebar state before first render to prevent flash
      // of custom title bar when system decorations are enabled.
      try {
        if (localStorage.getItem('qbz-use-system-titlebar') === 'true' ||
            localStorage.getItem('qbz-hide-titlebar') === 'true') {
          document.documentElement.dataset.noTitlebar = '';
        }
      } catch (e) {}
    </script>
    <style>
      /* Hide custom title bar before Svelte hydrates when setting is active */
      html[data-no-titlebar] .titlebar { display: none !important; }
    </style>
    <script>
      // Detect macOS for platform-specific CSS and behavior
      if (/Mac/.test(navigator.platform)) {
        document.documentElement.classList.add('macos');
      }
      // Prevent macOS trackpad pinch-to-zoom and Cmd+scroll zoom in WKWebView.
      // This is a desktop app, not a web page — accidental zoom breaks the UI.
      if (/Mac/.test(navigator.platform)) {
        document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
        document.addEventListener('gestureend', function(e) { e.preventDefault(); });
        document.addEventListener('wheel', function(e) {
          if (e.ctrlKey) e.preventDefault();
        }, { passive: false });
      }
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
